# docker-compose.yml — Qwen LLM on AMD GPUs
#
# Local test:
#   docker compose up -d --build
#
# Coolify:
#   Deploy from repo root. Model volume must exist on host.
#   Uses host network for Tailscale access.

version: "3.8"

services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qwen-llm-amd
    restart: unless-stopped

    # Host network gives direct Tailscale access
    network_mode: host
    # If not using host mode, expose port:
    # ports:
    #   - "8080:8080"

    volumes:
      # Model mounted from host (9 GB — too large for image)
      - /opt/llm/models:/opt/llm/models:ro
      # Persistent logs
      - /opt/llm/logs:/opt/llm/logs

    # GPU passthrough — required for ROCm
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

    # GPU access groups
    group_add:
      - video
      - render

    # ROCm needs seccomp unconfined for GPU ioctls
    security_opt:
      - seccomp:unconfined

    environment:
      - HIP_VISIBLE_DEVICES=0,1
      - HSA_OVERRIDE_GFX_VERSION=10.3.0

    # Override CMD if needed:
    # command: >
    #   --model /opt/llm/models/Qwen2.5-14B-Instruct-Q4_K_M.gguf
    #   --host 0.0.0.0
    #   --port 8080
    #   --n-gpu-layers 99
    #   --tensor-split 12,12
    #   --ctx-size 8192
    #   --threads 6
    #   --batch-size 512
    #   --flash-attn off
    #   --metrics
