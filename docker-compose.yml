# docker-compose.yml — Qwen LLM on AMD GPUs
#
# Deploy ON the AMD server (where GPUs are):
#   docker compose pull && docker compose up -d
#
# Port 8081 (8080 is used by Coolify proxy).
# Image built via scripts/build-docker.sh and pushed to ghcr.io.

version: "3.8"

services:
  llama-server:
    image: ghcr.io/miqbalf/qwen-llm-amd:latest
    container_name: qwen-llm-amd
    restart: unless-stopped

    network_mode: host

    volumes:
      - /opt/llm/models:/opt/llm/models:ro
      - /opt/llm/logs:/opt/llm/logs

    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

    group_add:
      - "44"    # video
      - "991"   # render

    security_opt:
      - seccomp:unconfined

    environment:
      - HIP_VISIBLE_DEVICES=0,1
      - HSA_OVERRIDE_GFX_VERSION=10.3.0

    command: >
      --model /opt/llm/models/DeepSeek-R1-Distill-Qwen-14B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8081
      --n-gpu-layers 99
      --tensor-split 12,12
      --ctx-size 32768
      --threads 6
      --batch-size 512
      --flash-attn off
      --metrics
