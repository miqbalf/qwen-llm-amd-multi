# docker-compose.yml — Qwen LLM on AMD GPUs
#
# Coolify: deploys pre-built image from ghcr.io
# Image is built on AMD server via scripts/build-docker.sh
#
# Local test (on AMD server):
#   docker compose up -d

version: "3.8"

services:
  llama-server:
    image: ghcr.io/miqbalf/qwen-llm-amd:latest
    container_name: qwen-llm-amd
    restart: unless-stopped

    # Host network gives direct Tailscale access
    network_mode: host

    volumes:
      # Model mounted from host (9 GB — too large for image)
      - /opt/llm/models:/opt/llm/models:ro
      # Persistent logs
      - /opt/llm/logs:/opt/llm/logs

    # GPU passthrough — required for ROCm
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd

    # GPU access groups
    group_add:
      - video
      - render

    # ROCm needs seccomp unconfined for GPU ioctls
    security_opt:
      - seccomp:unconfined

    environment:
      - HIP_VISIBLE_DEVICES=0,1
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
